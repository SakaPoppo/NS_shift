services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://ns_shift:ns_shift_password@db:5432/ns_shift"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ns_shift
      POSTGRES_USER: ns_shift
      POSTGRES_PASSWORD: ns_shift_password
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
