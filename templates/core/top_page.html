{% extends "base.html" %}
{% load static %}

{% block title %}Ns Shift | top{% endblock %}

{% block content %}
  <!-- ヒーロー領域。md 以上で左テキスト / 右画像の 2 カラムに切り替える。 -->
  <section class="mx-auto w-full max-w-[1280px] px-12 py-8 sm:px-12 sm:py-12 lg:px-14 lg:py-14">
    <div class="grid items-center gap-10 md:grid-cols-[minmax(0,1fr)_minmax(360px,440px)] md:gap-8 lg:grid-cols-[minmax(0,1fr)_minmax(400px,500px)] lg:gap-14">
      <!-- 左カラムはサービス説明と主要CTA。 -->
      <div class="max-w-[560px]">

        <h1 class="mt-8 text-[2.45rem] font-medium leading-[1.22] tracking-tight text-slate-900 sm:text-[3.25rem] lg:text-[3.6rem]">
          看護師のための
          <span class="mt-1 block text-brand-500">迷わないシフト管理</span>
        </h1>

        <p class="mt-8 w-full text-base leading-9 text-slate-600 sm:text-lg sm:leading-10">
          希望休と必要な人員数を入力するだけで<br>
          最適なシフトを自動生成
        </p>

        <div class="mt-12 flex flex-col gap-4 sm:flex-row">
          <a class="inline-flex min-h-[54px] items-center justify-center rounded-2xl bg-brand-500 px-8 text-xl font-medium text-white shadow-panel transition hover:bg-brand-600" href="#">
            無料で今すぐ始める
            <span class="ml-3 text-2xl leading-none">→</span>
          </a>
        </div>
      </div>

      <!-- 右カラムの画像は親幅に追従しつつ、max-w で拡大しすぎを防ぐ。 -->
      <div class="mx-auto w-full max-w-[500px]">
        <img
          class="h-auto w-full rounded-xl object-cover"
          src="{% static 'images/top_image.png' %}"
          alt="Ns Shift のシフト画面イメージ"
        >
      </div>
    </div>
  </section>
{% endblock %}
