{% extends "core/base.html" %}

{% block title %}スタッフ登録 | Ns Shift{% endblock %}

{% block content %}
  <section class="mx-auto w-full max-w-[800px] px-5 py-10 sm:px-8 lg:px-10">
    <div class="mb-8">
      <p class="text-sm font-semibold text-slate-500">スタッフ管理 &gt; 新規スタッフ登録</p>
      <h1 class="mt-2 text-[2rem] font-black tracking-tight text-slate-900">スタッフ登録</h1>
      <p class="mt-2 text-sm font-medium text-slate-600">
        新しいスタッフを登録します。シフト作成に必要な基本情報を入力してください。
      </p>
    </div>

    <div class="rounded-2xl border border-base-200 bg-white p-6 shadow-sm sm:p-8">
      {% include "staff/staff_member_form.html" with submit_label="保存する" %}
    </div>
  </section>
{% endblock %}
